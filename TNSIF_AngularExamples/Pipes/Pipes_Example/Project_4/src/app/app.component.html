

<!-- interpolation -->
<h1>{{title}}</h1> 

<p>Today's Date: {{today}}</p>
<p>Formatted Date (Short Date): {{today | date: 'shortDate'}}</p>
<p>Formatted Date (Full Date): {{today | date: 'fullDate'}}</p>

<!-- customised pipe -->

<p>Formatted Date (custom Format): {{today | date: 'yyyy-mm-dd HH:mm:ss'}}</p>
